name: Go CI

on:
  push:
    branches: [ dev, main, "feat/*" ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test -race -v ./...

      - name: Build binaries
        run: |
          go build -v ./cmd/api
          go build -v ./cmd/import-sample
          go build -v ./cmd/report
